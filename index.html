async function claude(sys,msgs,tools){
  const body={model:"claude-sonnet-4-20250514",max_tokens:2000,system:sys,messages:msgs};
  if(tools)body.tools=tools;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status)}
  const d=await r.json();return d.content?.map(b=>b.text||'').filter(Boolean).join('\n')||'Sem resultado.';
}

function fmtA(a){const tp=a.type==='Ride'?'ride':a.type==='Run'?'run':(a.type==='Soccer'||a.sport_type==='Soccer')?'soccer':'other';const ic=tp==='ride'?'🚴':tp==='soccer'?'⚽':tp==='run'?'🏃':'🏋️';const hr=Math.floor(a.moving_time/3600),mn=Math.floor((a.moving_time%3600)/60);const tm=hr>0?hr+'h'+String(mn).padStart(2,'0'):mn+'min';const ds=a.distance?(a.distance/1000).toFixed(1)+'km':null;const np=a.weighted_average_watts||a.average_watts||null;const tss=np&&a.moving_time?Math.round(((a.moving_time*np*(np/FTP))/(FTP*3600))*100):null;const dt=new Date(a.start_date_local);return{name:a.name,type:tp,icon:ic,time:tm,dist:ds,np,hr:a.average_heartrate?Math.round(a.average_heartrate):null,tss,date:String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'),elev:a.total_elevation_gain?Math.round(a.total_elevation_gain):null}}

async function doCurr(){if(!S.currQ.trim())return;if(noKey()){S.currRes='⚙️ Configure a API key.';render();return}S.currLoad=true;S.currRes=null;render();try{S.currRes=await claudeWS("Busque cotações. PT-BR, direto. Valor + variação dia/semana.","Cotação atual de: "+S.currQ.trim())}catch(e){S.currRes='Erro: '+e.message}S.currLoad=false;render()}
